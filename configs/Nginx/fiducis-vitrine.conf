# /etc/nginx/sites-available/fiducis  —  SRV-WEB (LAN 192.168.10.60)
# Sert le site statique (vitrine + espace client + prise de RDV) et relaie
# les formulaires vers les applications internes.

server {
    listen 80;
    server_name www.fiducis.fr fiducis.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.fiducis.fr fiducis.fr;

    ssl_certificate     /etc/ssl/fiducis/fullchain.pem;
    ssl_certificate_key /etc/ssl/fiducis/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # En-têtes de durcissement
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Racine du site statique (contenu du dossier web/site/ de ce dépôt)
    root /var/www/fiducis;
    index index.html;

    # Pages : URL propres sans .html (ex. /rendez-vous, /espace-client)
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Cache des ressources statiques
    location ~* \.(css|js|woff2?|png|jpe?g|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Traitement du formulaire de prise de rendez-vous -> application interne
    location /rdv/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Espace client (dépôt de pièces) -> application interne
    location /espace-client/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/fiducis-access.log;
    error_log  /var/log/nginx/fiducis-error.log;
}
