global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'vpn-servers'
    static_configs:
      - targets: ['10.10.0.11:9100']
        labels: {instance_name: 'srv-vpn-bdx'}
      - targets: ['10.10.0.12:9100']
        labels: {instance_name: 'srv-vpn-lr'}
      - targets: ['10.10.0.13:9100']
        labels: {instance_name: 'srv-vpn-bay'}

  - job_name: 'ad-dns-bordeaux'
    static_configs:
      - targets: ['192.168.10.1:9182']
        labels: {instance_name: 'srv-ad-bdx'}