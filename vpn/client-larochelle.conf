# /etc/openvpn/client/site2site.conf  —  GW-LR (La Rochelle)
client
dev tun
proto udp
remote 203.0.113.11 1194        # WAN du hub Bordeaux
resolv-retry infinite
nobind

ca       ca.crt
cert     larochelle.crt
key      larochelle.key
tls-auth ta.key 1
remote-cert-tls server

cipher AES-256-GCM
auth SHA256
tls-version-min 1.2
persist-key
persist-tun
keepalive 10 120
verb 3
